<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Página de Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: url('https://wallpapers.com/images/hd/kame-house-dragon-ball-8jivn6wnly5saqs5.webp') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            background: url('https://i.gifer.com/31Kl.gif') center/cover no-repeat;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.85); /* fundo branco semi-transparente */
            z-index: 0;
        }

        .login-card form,
        .login-card .text-center {
            position: relative;
            z-index: 1;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #6a11cb;
        }

        .btn-login {
            background: #6a11cb;
            border: none;
        }

        .btn-login:hover {
            background: #5a0fc4;
        }

        .text-small {
            font-size: 0.875rem;
        }

        .gif-topo {
            width: 90px;
            height: 90px;
            object-fit: contain;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <img src="https://media.tenor.com/s9gsHzftAIkAAAAj/vegeta-prince-o-sayans.gif" alt="Vegeta GIF" class="gif-topo">
        <h3 class="mt-2">Entrar na Conta</h3>
    </div>
    <form method="post" th:action="@{/login}">
        <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Digite seu usuário" required>
        </div>
        <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Digite sua senha" required>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="lembrar">
            <label class="form-check-label text-small" for="lembrar">Lembrar de mim</label>
        </div>
        <div class="d-grid">
            <button type="submit" class="btn btn-login text-white">Entrar</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
